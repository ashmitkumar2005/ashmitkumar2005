name: Generate Pac-Man Contribution Graph (Light + Dark Strip)

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # =========================
      # LIGHT MODE (Normal Clean)
      # =========================
      - name: Generate Pac-Man SVG (Light Mode)
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

          smooth_paths: true
          path_thickness: 2.2
          path_color: "#4a4a4a"

          pacman_color: "#ffcc00"
          ghost_color_style: "classic"

          grid_color: "#d9e0e7"
          background_color: "transparent"

          cell_size: 12
          spacing: 3

          output_name: pacman-light

      # ======================================
      # DARK MODE (NO MONTHS / DARK STRIP LOOK)
      # ======================================
      - name: Generate Pac-Man SVG (Dark Strip Mode)
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

          smooth_paths: true
          path_thickness: 2.0
          path_color: "#0d1117"        # maze invisible

          pacman_color: "#0d1117"      # pacman hidden
          ghost_color_style: "classic" # ghosts merge into bg

          grid_color: "#f0f6fc"        # bright cells
          background_color: "#0d1117"  # solid dark strip (GitHub dark bg)

          cell_size: 12
          spacing: 3

          output_name: pacman-dark

      # =================
      # PUBLISH BOTH SVGs
      # =================
      - name: Publish Pac-Man SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
